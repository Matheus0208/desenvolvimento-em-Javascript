<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UFT-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrutura condicionais e repetições</title>
</head>
<body>
    <h1>Atividade 2</h1>
    <script>
        for(let i = 0; i<2; i++){
            let peso = parseFloat(prompt('Informe o peso: '));

            if(peso <= 40){
                alert('você é peso pena');
            }
            if (peso >= 41 && peso <=60){
                alert('Você é peso mosca');
            }else{
                alert('Você é peso pesado')
            }
            console.log("No valor " + i + " foi informado o peso " + peso + "Kg")
        }
    </script>
</body>
</html>
